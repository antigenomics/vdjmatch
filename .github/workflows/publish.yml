name: Publish To PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    # vdjmatch is pure Python (hatchling) -> one sdist + one universal wheel via `build`.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  smoke:
    name: Smoke-test wheel (py${{ matrix.python-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Install built wheel (+ seqtree from source until it is on PyPI)
        run: |
          pip install --upgrade pip cmake ninja
          pip install "git+https://github.com/antigenomics/seqtree.git@master"
          pip install --no-deps dist/*.whl
          pip install polars
      - name: Import vdjmatch
        run: python -c "import vdjmatch; print('[OK] vdjmatch', vdjmatch.__version__)"

  publish:
    name: Publish To PyPI
    needs: [build, smoke]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - name: Validate package version matches release tag
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = "${{ github.event.release.tag_name }}"
          norm = tag[1:] if tag.startswith("v") else tag
          if version != norm:
              raise SystemExit(f"Version mismatch: pyproject.toml={version}, tag={tag}")
          print(f"Version check passed: {version} == {tag}")
          PY
      - name: List distributions
        run: ls -R dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
